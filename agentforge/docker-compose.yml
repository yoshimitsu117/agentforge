version: "3.9"

services:
  agentforge:
    build: .
    container_name: agentforge
    ports:
      - "8001:8001"
    volumes:
      - ./workspace:/app/workspace
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
